# PR gate (KICKOFF §7 "Runs"): lint → types → tests (incl. fitness gates +
# SIGKILL crash test) → perf-gate warnings (KICKOFF §6 PR subset) →
# demo-run-twice → wheel purity. Nightly trends + deep torture: nightly.yml (later).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment (Python pinned via .python-version; extras for their tests)
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (pyright — standard mode, all paths; tests keep the magic-query pragmas)
        run: uvx pyright src tests examples benchmarks

      - name: Type check (pyright — STRICT, library only; src/ is strict-clean at the v0.1.0 tag)
        run: uvx pyright -p pyrightconfig.strict.json

      - name: Tests (unit, property, integration, extras, fitness gates)
        run: uv run pytest -q

      - name: Perf gates (KICKOFF §6 PR subset — same-run ratios, warn-stage)
        if: matrix.os == 'ubuntu-latest'
        run: DC_BENCH_SPECIMENS=30000 uv run pytest benchmarks -q -s

      - name: Demo survives a rerun (persistence smoke)
        run: |
          uv run python examples/minerals/demo.py
          uv run python examples/minerals/demo.py

      - name: Journal survives a rerun (M2 scenes incl. async session)
        run: |
          uv run python examples/journal/journal.py
          uv run python examples/journal/journal.py

      - name: Wheel purity (fitness #17 — pure py3-none-any, no native code)
        run: |
          uv build
          python3 - << 'EOF'
          import glob, sys, zipfile
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built"
          [wheel] = wheels
          assert "py3-none-any" in wheel, f"wheel is not pure: {wheel}"
          bad = [n for n in zipfile.ZipFile(wheel).namelist()
                 if n.endswith((".so", ".pyd"))]
          assert not bad, f"native code in the wheel: {bad}"
          print(f"wheel OK: {wheel}")
          EOF
